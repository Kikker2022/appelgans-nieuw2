<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Appelgans</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<h1>🪿 Appelgans</h1>

<!-- =========================
     🟢 WELKOMSTSCHERM
========================= -->
<div id="welcomeScreen">

<h2>Welkom bij Appelgans</h2>

<p>
Welkom bij het ganzenbordspel Appelgans.<br><br>
Klik op start om het spel in te stellen.
</p>

<button onclick="showScreen(screen0)">
Start instellen
</button>

</div>


<!-- =========================
     🟡 INSTELLINGEN + MULTIPLAYER
========================= -->
<div id="screen0" class="hidden">

<h2>Start spel</h2>

<!-- 👑 HOST -->
<h3>👑 Host spel maken</h3>

<input id="hostName" placeholder="Naam host">
<input id="gameCode" placeholder="4-cijferige code" maxlength="4">

<button onclick="createGame()">
Maak spel
</button>

<hr>

<!-- 📱 JOIN -->
<h3>📱 Deelnemen</h3>

<input id="joinName" placeholder="Jouw naam">
<input id="joinCode" placeholder="4-cijferige code" maxlength="4">

<button onclick="joinGame()">
Doe mee
</button>

<div id="playerList"></div>

<hr>

<!-- TEAMS -->
<p>Aantal teams</p>
<select id="teamCount" onchange="updateTeamInputs()">
<option value="2">2 teams</option>
<option value="3">3 teams</option>
<option value="4" selected>4 teams</option>
</select>

<h3>Teamnamen</h3>

<div id="teamInputs">

<div class="teamInput" data-team="1">
<input id="team1Name" value="Blauw">
</div>

<div class="teamInput" data-team="2">
<input id="team2Name" value="Rood">
</div>

<div class="teamInput" data-team="3">
<input id="team3Name" value="Groen">
</div>

<div class="teamInput" data-team="4">
<input id="team4Name" value="Paars">
</div>

</div>

<!-- CATEGORIE -->
<p>Categorie</p>

<select id="categorySelect">
<option value="Ooststellingwerf">Ooststellingwerf</option>
<option value="Fryslân">Fryslân</option>
<option value="Groningen">Groningen</option>
<option value="Drenthe">Drenthe</option>
<option value="Pubquiz">Pubquiz</option>
</select>

<br><br>

<button onclick="startGame()">
Start spel
</button>

</div>


<!-- =========================
     🔵 SPEL SCHERM 1
========================= -->
<div id="screen1" class="hidden">

<h2 id="turn"></h2>
<p id="currentCategory"></p>

<button onclick="rollDice()">🎲 Gooi dobbelsteen</button>

<p id="diceResult"></p>
<p id="statusMessage"></p>

</div>


<!-- =========================
     🟣 VRAGEN
========================= -->
<div id="screen2" class="hidden">

<h2>Vraag</h2>

<p id="question"></p>

<button id="btnA" onclick="checkAnswer('a')" class="answerBtn"></button>
<button id="btnB" onclick="checkAnswer('b')" class="answerBtn"></button>
<button id="btnC" onclick="checkAnswer('c')" class="answerBtn"></button>

<p id="explanation"></p>

</div>


<!-- =========================
     🟤 BORD
========================= -->
<div id="screen3" class="hidden">

<div id="board"></div>

</div>

<div id="popup"></div>


<!-- =========================
     SCRIPTS
========================= -->
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-database-compat.js"></script>

<script src="data/vragen.js"></script>
<script src="firebase.js"></script>
<script src="multiplayer.js"></script>
<script src="app.js"></script>

</body>
</html>
