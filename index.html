<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Appelgans</title>

<link rel="stylesheet" href="style.css">
</head>

<body>

<h1>🪿 Appelgans</h1>

<!-- SCHERM 0 -->
<div id="screen0" class="hidden">
  <h2>Start spel</h2>

  <p>Kies categorie:</p>
  <p>Aantal teams:</p>

<select id="teamCount">
  <option value="2">2 teams</option>
  <option value="3">3 teams</option>
  <option value="4" selected>4 teams</option>
</select>

  <select id="categorySelect">
    <option value="Ooststellingwerf">Ooststellingwerf</option>
    <option value="Fryslân">Fryslân</option>
    <option value="Groningen">Groningen</option>
    <option value="Drenthe">Drenthe</option>
    <option value="Educatief">Educatief</option>
  </select>

  <br><br>

  <button onclick="startGame()">Start spel</button>
</div>
  
<!-- SCHERM 1 -->
<div id="screen1" class="hidden">

<h2 id="turn"></h2>

<p id="currentCategory"></p>

<br>

<button onclick="rollDice()">
🎲 Gooi dobbelsteen
</button>

<p id="diceResult"></p>

<p id="statusMessage"></p>

</div>


<!-- SCHERM 2 -->
<div id="screen2" class="hidden">

<h2>Vraag</h2>

<p id="question"></p>

<button id="btnA"
class="answerBtn"
onclick="checkAnswer('a')">
A
</button>

<button id="btnB"
class="answerBtn"
onclick="checkAnswer('b')">
B
</button>

<button id="btnC"
class="answerBtn"
onclick="checkAnswer('c')">
C
</button>

<p id="explanation"></p>

</div>


<!-- SCHERM 3 -->
<div id="screen3" class="hidden">

<div id="board"></div>

</div>


<!-- POPUP -->
<div id="popup"></div>


<script src="data/vragen.js"></script>
<script src="app.js"></script>

</body>
</html>
