<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Appelgans</title>

<link rel="stylesheet" href="style.css?v=2">
</head>

<body>

<h1>🪿 Appelgans 🪿</h1>

<div id="gameContainer">

<div id="leftPanel">

<div id="controls">
<h2 id="turn">🔵 is aan de beurt</h2>

<button onclick="rollDice()">
🎲 Gooi dobbelsteen
</button>

<p id="diceResult"></p>
</div>

<div id="questionBox">

<h2>Vraag</h2>

<p id="question">
Vraag verschijnt hier...
</p>

<div id="answers">

<button class="answerBtn" id="btnA"
onclick="checkAnswer('a')">
A
</button>

<button class="answerBtn" id="btnB"
onclick="checkAnswer('b')">
B
</button>

<button class="answerBtn" id="btnC"
onclick="checkAnswer('c')">
C
</button>

</div>

<p id="explanation"></p>

</div>

<div id="popup"></div>

</div>

<div id="board"></div>

</div>

<script src="data/vragen.js"></script>
<script src="app.js?v=2"></script>
  
</body>
</html>
